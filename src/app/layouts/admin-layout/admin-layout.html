<div
  class="flex h-screen overflow-hidden antialiased transition-colors duration-500 bg-[#fff1e6] dark:bg-[#0e0e0e]"
>
  <!-- Sidebar -->
  <app-admin-sidebar
    class="flex-shrink-0"
    [isOpen]="sidebarOpen()"
    (closeEvent)="closeSidebar()"
  ></app-admin-sidebar>

  <!-- Main content -->
  <div class="flex-1 flex flex-col min-w-0 relative">
    <app-header (toggleSidebar)="toggleSidebar()"></app-header>

    <main class="flex-1 overflow-y-auto ci-main-scrollbar">
      <router-outlet></router-outlet>
    </main>

    <app-footer class="flex-shrink-0"></app-footer>
  </div>
</div>
