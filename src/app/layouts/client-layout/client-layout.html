<div
  class="main-container flex h-screen overflow-hidden font-sans transition-colors duration-500 bg-[#fff1e6] dark:bg-[#0e0e0e]"
>
  <!-- Sidebar — full height -->
  <app-client-sidebar
    class="flex-shrink-0 border-e border-[#e6d5c3] dark:border-[#444547]/30 shadow-2xl shadow-[#e6d5c3]/40 dark:shadow-none transition-all duration-500"
    [isOpen]="sidebarOpen()"
    (closeEvent)="closeSidebar()"
  ></app-client-sidebar>

  <!-- Right column: header + main + footer -->
  <div class="flex flex-col flex-1 overflow-hidden">
    <app-header
      class="flex-shrink-0 z-50 border-b border-[#e6d5c3]/60 dark:border-[#444547]/30 backdrop-blur-md bg-white/80 dark:bg-[#0e0e0e]/80 shadow-sm"
      (toggleSidebar)="toggleSidebar()"
    ></app-header>

    <main class="flex-1 overflow-y-auto ci-scrollbar relative bg-transparent">
      <div class="max-w-[1400px] mx-auto p-4 md:p-10 relative z-10">
        <router-outlet></router-outlet>
      </div>
    </main>

    <app-footer
      class="flex-shrink-0 border-t border-[#e6d5c3] dark:border-[#444547]/30 bg-white dark:bg-[#0e0e0e] transition-colors duration-500"
    ></app-footer>
  </div>
</div>
